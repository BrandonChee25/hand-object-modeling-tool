# Hand-Object Modeling Tool — default configuration
# Override individual keys by passing --config my_override.yaml to the CLI.

device: cuda

# --- Model checkpoints (paths relative to repo root or absolute) ---
wilor_checkpoint: checkpoints/wilor.pth
moge_checkpoint: Ruicheng/moge-vitl
sam2_checkpoint: /gscratch/scrubbed/bchee05/checkpoints/sam2.1_hiera_large.pt
sam2_config: configs/sam2.1/sam2.1_hiera_l.yaml
# sam3d_checkpoint unused — SAM-3D is not publicly released; TripoSR is used instead
# (weights download automatically from HuggingFace: stabilityai/TripoSR)

# --- Stage 1: Preprocessing ---
hand_detection_confidence: 0.3   # minimum YOLO score to accept a hand bbox

# --- Stage 3: Object segmentation ---
# SAM3 is used automatically when installed (compute cluster); SAM-2 is used as fallback.
# Set use_sam3: false to force SAM-2 even when SAM3 is present.
use_sam3: true
sam3_version: sam3.1   # facebook/sam3.1 on HuggingFace (or facebook/sam3 for v1)
# object_point: [x, y] — manual pixel coordinate on the held object in the anchor frame.
# Only needed if both SAM3 and the SAM-2 hand-box prompt fail to find the correct object.
crop_padding_px: 32              # pixels to pad around the object crop
hand_overlap_threshold: 0.30     # max fraction of a segment overlapping the hand
detection_candidate_frames: 5   # how many frames to try the hand-box prompt on

# --- Stage 6: Alignment ---
grip_position: 0.6        # 0=palm centre, 1=fingertips; where the object is initially placed
max_contact_push_m: 0.10  # safety cap on how far the object can be pushed to clear the hand mesh
